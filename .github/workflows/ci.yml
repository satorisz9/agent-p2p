name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck src
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck -- --pretty false > typecheck.log 2>&1 || true
          cat typecheck.log

          if awk '/error TS/ && $0 !~ /^site\// { found=1 } END { exit found ? 0 : 1 }' typecheck.log; then
            echo "Non-site type errors found."
            exit 1
          fi

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
