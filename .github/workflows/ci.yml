name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Typecheck src
        shell: bash
        run: |
          set -o pipefail
          if npx tsc --noEmit 2>&1 \
            | tee typecheck.log \
            | grep 'error TS' \
            | grep -v '^site/' \
            | grep -v '^src/lib/p2p/swarm.ts' \
            | grep -v '^src/lib/invite/manager.ts'; then
            echo "Unexpected src type errors found."
            exit 1
          fi

      - name: Unit tests
        run: npm test

      # E2E tests require Hyperswarm DHT (P2P network) which is not
      # available in CI runners. Run locally: npm run test:e2e
